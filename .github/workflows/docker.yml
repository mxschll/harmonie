name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Cancel in-flight builds for the same ref when a new push lands.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Built for linux/amd64 only. Essentia (and essentia-tensorflow) publish only
# manylinux_2_17_x86_64 wheels on PyPI — no linux/aarch64 wheel exists, so a
# multi-arch build would fail on the arm64 leg. Apple Silicon and other
# arm64 hosts run the amd64 image via Rosetta / qemu-user, which Docker
# handles transparently.
jobs:
  build:
    name: build${{ github.event_name == 'pull_request' && '' || ' & push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Tag scheme:
          #   * latest                  — default-branch pushes only
          #   * main / pr-<n>           — branch / PR refs
          #   * sha-<short>             — always
          #   * 0.1.<run_number>        — auto-version per main push
          #   * <X.Y.Z> / <X.Y> / <X>   — when a vX.Y.Z git tag is pushed
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=0.1.${{ github.run_number }},enable={{is_default_branch}}

      - name: Build${{ github.event_name == 'pull_request' && '' || ' and push' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          # Push only when this is a real merge to main or a tag — never on PRs.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

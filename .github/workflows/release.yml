name: release

# Auto-tag every push to main with the next version.
#
# Default bump is the patch component. Override with a marker on the
# *subject line* of the commit message (the first line):
#
#   [bump minor]   -> 1.0.5 → 1.1.0
#   [bump major]   -> 1.1.0 → 2.0.0
#   [skip release] -> no tag created (alias: [skip ci])
#
# Subject-only matching is deliberate: it stops markers in code fences,
# in the body of a meta-commit (e.g. one that documents the markers),
# or quoted in a PR description from accidentally bumping the version.
# For PR merges, put the marker in the squash/merge commit's subject —
# the simplest is to include it in the PR title.

on:
  push:
    branches: [main]

# Serialise so two pushes in quick succession don't both compute the
# same next version.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: tag and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so git tag --list sees every prior version.
          fetch-depth: 0
          fetch-tags: true

      - name: Decide bump
        id: decide
        run: |
          # %s is the subject line only. Markers anywhere in the body
          # are intentionally ignored to keep meta-commits safe.
          subject=$(git log -1 --pretty=%s)
          echo "subject: $subject"
          if echo "$subject" | grep -qE '\[skip release\]|\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release per subject marker."
          elif echo "$subject" | grep -qE '\[bump major\]'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$subject" | grep -qE '\[bump minor\]'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.decide.outputs.skip == 'false'
        id: bump
        env:
          LEVEL: ${{ steps.decide.outputs.level }}
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          latest=${latest:-v0.0.0}
          IFS='.' read -r major minor patch <<< "${latest#v}"
          case "$LEVEL" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "unknown bump level: $LEVEL" >&2; exit 1 ;;
          esac
          new="v${major}.${minor}.${patch}"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Bumping ${latest} -> ${new} (level=${LEVEL})"

      - name: Push tag
        if: steps.decide.outputs.skip == 'false'
        env:
          NEW_TAG: ${{ steps.bump.outputs.new }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub release
        if: steps.decide.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new }}
          name: ${{ steps.bump.outputs.new }}
          generate_release_notes: true
